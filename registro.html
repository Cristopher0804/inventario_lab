<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Equipo - CBTIS 258</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg,#f0eaff,#e6e0ff,#f0f0ff);
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden; /* evita scroll horizontal */
  padding: 10px;
}

/* BARRA SUPERIOR */
.top-bar {
  width: 100%;
  background: white;
  padding: 15px;
  border-radius: 25px;
  display: flex;
  flex-wrap: wrap; /* permite que elementos bajen en móvil */
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 10px 35px rgba(110,51,255,0.1);
  border-left: 5px solid #6E33FF;
  margin-bottom: 20px;
}

/* LOGO */
.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #6E33FF;
}

.logo-text {
  font-weight: 800;
  color: #6E33FF;
  font-size: 22px;
}

/* MENÚ */
.menu {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.menu button {
  padding: 12px 20px;
  border: none;
  border-radius: 30px;
  font-weight: 700;
  cursor: pointer;
  background: #f4efff;
  min-width: 100px;
  text-align: center;
  transition: 0.3s;
}

.menu button:hover {
  background: #6E33FF;
  color: white;
  transform: scale(1.05);
}

.menu .active {
  background: linear-gradient(90deg,#6E33FF,#A17BFF);
  color: white;
}

.menu .btn-salir {
  background: linear-gradient(90deg,#FF3B3B,#FF6B6B);
  color: white;
  font-weight: 800;
}

/* FORMULARIO */
.card-form {
  width: 100%;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  border-radius: 25px;
  padding: 20px;
  box-shadow: 0 30px 70px rgba(110,51,255,0.1);
}

.header-form h3 {
  font-size: 24px;
  color: #6E33FF;
  margin-bottom: 15px;
  border-bottom: 2px solid #A17BFF;
  padding-bottom: 6px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

label {
  display: block;
  margin-bottom: 6px;
  font-weight: 700;
  color: #555;
  font-size: 12px;
  text-transform: uppercase;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 2px solid #eee;
  background: #fcfcfc;
  font-size: 14px;
  transition: 0.3s;
}

input:focus, select:focus {
  border-color: #6E33FF;
  outline: none;
  background: white;
  box-shadow: 0 0 15px rgba(110,51,255,0.1);
}

.btn-submit {
  grid-column: span 2;
  padding: 16px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(90deg,#6E33FF,#A17BFF);
  color: white;
  font-weight: 800;
  cursor: pointer;
}

.btn-submit:hover {
  transform: scale(1.03);
  box-shadow: 0 25px 50px rgba(110,51,255,0.4);
}

/* RESPONSIVE MÓVIL */
@media(max-width:600px) {
  .top-bar {
    flex-direction: column;
    align-items: center;
    padding: 10px;
    gap: 10px;
  }

  .menu {
    flex-direction: column;
    width: 100%;
  }

  .menu button {
    width: 100%;
    min-width: 0;
  }

  .form-grid {
    grid-template-columns: 1fr;
  }

  .btn-submit {
    grid-column: span 1;
  }
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo-area">
    <img src="logo_cbtis.jpg" class="logo-img">
    <div class="logo-text">CBTIS 258</div>
  </div>

  <div class="menu">
    <button class="active">Registro</button>
    <button>Solicitudes</button>
    <button>Laboratorios</button>
    <button>Equipos</button>
    <button class="btn-salir">Salir</button>
  </div>
</div>

<div class="card-form">
  <div class="header-form">
    <h3>Registro de equipos</h3>
  </div>

  <div class="form-grid">
    <div>
      <label>Categoría del Equipo</label>
      <select>
        <option>Computadora de Escritorio</option>
        <option>Servidor</option>
        <option>Laptop</option>
      </select>
    </div>

    <div>
      <label>Marca Fabricante</label>
      <input type="text" placeholder="Ej. Dell / HP">
    </div>

    <div>
      <label>Modelo Específico</label>
      <input type="text" placeholder="Ej. Latitude 5420">
    </div>

    <div>
      <label>Número de Serie</label>
      <input type="text" placeholder="S/N único del equipo">
    </div>

    <div>
      <label>Asignar a Laboratorio</label>
      <select>
        <option>Laboratorio 1</option>
        <option>Laboratorio 2</option>
        <option>Laboratorio 3</option>
      </select>
    </div>

    <div>
      <label>Fecha de Recepción</label>
      <input type="date">
    </div>

    <button class="btn-submit">GUARDAR REGISTRO</button>
  </div>
</div>

</body>
</html>
