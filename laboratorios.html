<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Laboratorios - CBTIS 258</title>

<style>
* { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin:0; padding:0; }

body {
min-height: 100vh;
background: linear-gradient(135deg,#f0eaff,#e6e0ff,#f0f0ff);
background-size: 400% 400%;
animation: gradient 15s ease infinite;
display: flex;
flex-direction: column;
align-items: center;
padding: 40px 20px;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* TOP BAR */

.top-bar{
width: 100%;
max-width: 1200px;
background:white;
padding:20px 40px;
border-radius:25px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 35px rgba(110,51,255,0.1);
border-left: 5px solid #6E33FF;
margin-bottom: 40px;
}

/* LOGO */

.logo-area{
display:flex;
align-items:center;
gap:12px;
}

.logo-img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
border:3px solid #6E33FF;
box-shadow:0 5px 12px rgba(0,0,0,0.2);
}

.logo-text{
font-weight:800;
color:#6E33FF;
font-size:26px;
}

/* MENU */

.menu{ display:flex; gap:15px; flex-wrap: wrap; }

.menu button{
background:#f4efff;
border:none;
padding:12px 25px;
border-radius:30px;
font-weight:700;
cursor:pointer;
transition:0.3s;
}

.menu button:hover{
background:#6E33FF;
color:white;
transform: scale(1.05);
}

.menu .active{
background: linear-gradient(90deg,#6E33FF,#A17BFF);
color:white;
transform: scale(1.05);
}

.menu .btn-salir{
background: linear-gradient(90deg,#FF3B3B,#FF6B6B);
color:white;
font-weight:800;
}

.menu .btn-salir:hover{
transform: scale(1.05);
box-shadow:0 10px 25px rgba(255,59,59,0.5);
}

/* CONTAINER */

.container{
width: 100%;
max-width: 950px;
}

/* LABORATORIOS */

.lab-card{
background: rgba(255,255,255,0.85);
backdrop-filter: blur(12px);
border-radius:30px;
padding:30px;
margin-bottom:25px;
box-shadow:0 30px 70px rgba(110,51,255,0.1);
cursor:pointer;
transition: transform 0.3s;
}

.lab-card:hover{ transform: translateY(-5px); }

.lab-title{ font-weight:700; font-size:20px; color:#6E33FF; }

/* EQUIPOS */

.equipo-card{
background: rgba(255,255,255,0.85);
backdrop-filter: blur(12px);
border-radius:25px;
padding:20px;
margin:15px 0;
box-shadow:0 20px 50px rgba(110,51,255,0.1);
position: relative;
}

.equipo-card div{ margin-bottom:8px; font-size:14px; }

/* BOTONES */

.btn-eliminar{
position:absolute;
bottom:15px;
right:15px;
padding:10px 18px;
border:none;
border-radius:25px;
background: linear-gradient(90deg,#FF3B3B,#FF6B6B);
color:white;
font-weight:800;
cursor:pointer;
transition:0.3s;
}

.btn-eliminar:hover{ box-shadow:0 10px 25px rgba(255,59,59,0.5); }

.btn-volver{
margin-top:20px;
padding:18px 35px;
border:none;
border-radius:25px;
background: linear-gradient(90deg,#6E33FF,#A17BFF);
color:white;
font-weight:800;
font-size:15px;
cursor:pointer;
box-shadow:0 20px 50px rgba(110,51,255,0.3);
transition:0.3s;
}

.btn-volver:hover{
transform: scale(1.05);
box-shadow:0 25px 60px rgba(110,51,255,0.4);
}

/* VACIO */

.empty{
background: rgba(255,255,255,0.85);
backdrop-filter: blur(12px);
padding:60px;
border-radius:25px;
text-align:center;
box-shadow:0 25px 60px rgba(110,51,255,0.1);
}

.empty-icon{ font-size:60px; margin-bottom:10px; }

</style>
</head>

<body>

<!-- TOP BAR -->

<div class="top-bar">

<div class="logo-area">
<img src="logo_cbtis.jpg" class="logo-img">
<div class="logo-text">CBTIS 258</div>
</div>

<div class="menu">
<button onclick="window.location.href='registro.html'">Registro</button>
<button onclick="window.location.href='solicitud.html'">Solicitudes</button>
<button class="active" onclick="window.location.href='laboratorios.html'">Laboratorios</button>
<button onclick="window.location.href='inventario.html'">Equipos</button>
<button class="btn-salir" onclick="window.location.href='index.html'">Salir</button>
</div>

</div>

<!-- CONTAINER -->

<div class="container" id="contenedor"></div>

<script>

let contenedor = document.getElementById("contenedor");
let equipos = JSON.parse(localStorage.getItem("equipos")) || {"1":[],"2":[],"3":[]};

function mostrarLaboratorios() {

contenedor.innerHTML = "";

for(let i=1;i<=3;i++){

let labCard = document.createElement("div");

labCard.className = "lab-card";

labCard.innerHTML = `<div class="lab-title">Laboratorio ${i}</div>`;

labCard.onclick = () => mostrarEquipos(i);

contenedor.appendChild(labCard);

}

}

function mostrarEquipos(lab){

contenedor.innerHTML = "";

let labEquipos = equipos[lab];

if(labEquipos.length===0){

contenedor.innerHTML = `<div class="empty">
<div class="empty-icon">📭</div>
<h3>No hay equipos registrados en Laboratorio ${lab}</h3>
</div>`;

}else{

labEquipos.forEach((eq,index)=>{

let eqCard = document.createElement("div");

eqCard.className = "equipo-card";

eqCard.innerHTML = `
<div><b>Categoría:</b> ${eq.categoria}</div>
<div><b>Marca:</b> ${eq.marca}</div>
<div><b>Modelo:</b> ${eq.modelo}</div>
<div><b>Número de Serie:</b> ${eq.serie}</div>
<div><b>Fecha de Recepción:</b> ${eq.fecha}</div>
`;

let btnEliminar = document.createElement("button");

btnEliminar.className = "btn-eliminar";

btnEliminar.textContent = "Eliminar";

btnEliminar.onclick = (e)=>{

e.stopPropagation();

if(confirm("¿Deseas eliminar este equipo?")){

equipos[lab].splice(index,1);

localStorage.setItem("equipos",JSON.stringify(equipos));

mostrarEquipos(lab);

}

};

eqCard.appendChild(btnEliminar);

contenedor.appendChild(eqCard);

});

}

let volverBtn = document.createElement("button");

volverBtn.className = "btn-volver";

volverBtn.textContent = "← Volver a Laboratorios";

volverBtn.onclick = mostrarLaboratorios;

contenedor.appendChild(volverBtn);

}

mostrarLaboratorios();

</script>

</body>
</html>
