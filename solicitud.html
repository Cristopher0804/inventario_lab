<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Administrativo - Solicitudes</title>

<style>

/* ===============================
   GLOBAL
=============================== */
* {
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg,#f0eaff,#e6e0ff,#f0f0ff);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}

@keyframes gradient {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

/* ===============================
   TOP BAR
=============================== */
.top-bar {
  width: 100%;
  max-width: 1200px;
  background: white;
  padding: 20px 40px;
  border-radius: 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 10px 35px rgba(110,51,255,0.1);
  margin-bottom: 40px;
  border-left: 5px solid #6E33FF;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 3px solid #6E33FF;
}

.logo-text {
  font-weight: 800;
  color: #6E33FF;
  font-size: 26px;
}

/* ===============================
   MENU
=============================== */
.menu {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
}

.menu button {
  background: #f4efff;
  border: none;
  padding: 12px 25px;
  border-radius: 30px;
  font-weight: 700;
  cursor: pointer;
  transition: .3s;
}

.menu button:hover {
  background: #6E33FF;
  color: white;
  transform: scale(1.05);
}

/* ===============================
   RESALTAR SECCION ACTIVA
=============================== */
.menu .active {
  background: linear-gradient(90deg,#6E33FF,#A17BFF);
  color: white;
  box-shadow: 0 5px 15px rgba(110,51,255,.2);
}

.menu .btn-salir {
  background: linear-gradient(90deg,#FF3B3B,#FF6B6B);
  color: white;
}

/* ===============================
   CONTENEDOR
=============================== */
.container {
  width: 100%;
  max-width: 950px;
  padding: 0 15px;
}

/* ===============================
   SWITCH
=============================== */
.switch {
  display: flex;
  gap: 15px;
  margin-bottom: 25px;
}

.switch button {
  padding: 12px 28px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  background: #ece8ff;
  font-weight: 700;
  color: #555;
  transition: .3s;
}

.switch button:hover {
  transform: scale(1.05);
}

.switch .active {
  background: linear-gradient(90deg,#6E33FF,#A17BFF);
  color: white;
  box-shadow: 0 10px 25px rgba(110,51,255,.3);
}

/* ===============================
   CARD FORM
=============================== */
.card-form {
  background: white;
  border-radius: 30px;
  padding: 45px;
  box-shadow: 0 25px 60px rgba(0,0,0,.1);
}

.header-form h3 {
  font-size: 26px;
  color: #6E33FF;
  margin-bottom: 25px;
  border-bottom: 2px solid #A17BFF;
  padding-bottom: 10px;
}

/* ===============================
   FORM GRID
=============================== */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
}

label {
  font-size: 12px;
  font-weight: 700;
  color: #555;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: block;
}

input, select, textarea {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: 2px solid #e7e2ff;
  background: #faf9ff;
  font-size: 14px;
  transition: .25s;
}

input:hover, select:hover, textarea:hover {
  border-color: #a88bff;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: #6E33FF;
  background: white;
  box-shadow: 0 0 0 3px rgba(110,51,255,.15),
              0 10px 25px rgba(110,51,255,.1);
  transform: scale(1.02);
}

textarea {
  grid-column: span 2;
  height: 110px;
  resize: none;
}

/* ===============================
   BOTON
=============================== */
.btn-submit {
  grid-column: span 2;
  background: linear-gradient(90deg,#6E33FF,#A17BFF);
  color: white;
  border: none;
  padding: 18px;
  border-radius: 30px;
  font-weight: 800;
  font-size: 15px;
  cursor: pointer;
  transition: .3s;
  box-shadow: 0 18px 35px rgba(110,51,255,.3);
}

.btn-submit:hover {
  transform: scale(1.05);
  box-shadow: 0 25px 50px rgba(110,51,255,.4);
}

/* ===============================
   TABLA
=============================== */
.table-wrapper {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  min-width: 700px;
}

th {
  background: #f4efff;
  color: #6E33FF;
  padding: 14px;
}

td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

tr:hover {
  background: #faf8ff;
}

/* ESTADOS */
.estado {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
}

.espera { background: #ffe7a3; }

/* ===============================
   RESPONSIVE
=============================== */
@media (max-width: 768px) {
  .form-grid { grid-template-columns: 1fr; }
  .switch { flex-direction: column; gap: 10px; }
  .menu { flex-direction: column; gap: 10px; }
}

@media (max-width: 600px) {
  th, td { font-size: 12px; padding: 10px; }
}

@media (max-width: 480px) {
  .btn-submit { padding: 14px; font-size: 13px; }
  .logo-text { font-size: 22px; }
}

</style>
</head>

<body>

<!-- ===============================
     BARRA SUPERIOR
=============================== -->
<div class="top-bar">

  <div class="logo-area">
    <img src="logo_cbtis.jpg" class="logo-img">
    <div class="logo-text">CBTIS 258</div>
  </div>

  <div class="menu">
    <button onclick="window.location.href='registro.html'">Registro</button>
    <button class="active" onclick="window.location.href='solicitud.html'">Solicitudes</button>
    <button onclick="window.location.href='laboratorios.html'">Laboratorios</button>
    <button onclick="window.location.href='inventario.html'">Equipos</button>
    <button class="btn-salir" onclick="window.location.href='menu.html'">Salir</button>
  </div>

</div>

<div class="container">

  <!-- ===============================
       SWITCH NUEVA/LISTA
  ================================ -->
  <div class="switch">
    <button id="btnNueva" onclick="mostrarNueva()">Nueva solicitud</button>
    <button id="btnLista" class="active" onclick="mostrarLista()">Solicitudes</button>
  </div>

  <!-- ===============================
       NUEVA SOLICITUD
  ================================ -->
  <div id="nueva" style="display:none">

    <div class="card-form">
      <div class="header-form">
        <h3>Nueva Solicitud</h3>
      </div>

      <div class="form-grid">
        <div>
          <label>Laboratorio</label>
          <select id="laboratorio">
            <option>Lab 1</option>
            <option>Lab 2</option>
            <option>Lab 3</option>
          </select>
        </div>

        <div>
          <label>Nombre del solicitante</label>
          <input type="text" id="nombre">
        </div>

        <div>
          <label>Tipo</label>
          <select id="tipo">
            <option>Material</option>
            <option>Equipo</option>
            <option>Herramienta</option>
          </select>
        </div>

        <div>
          <label>Cantidad</label>
          <input type="number" id="cantidad">
        </div>

        <textarea id="descripcion" placeholder="Descripción"></textarea>

        <button class="btn-submit" onclick="guardarSolicitud()">Guardar solicitud</button>
      </div>
    </div>
  </div>

  <!-- ===============================
       LISTA DE SOLICITUDES
  ================================ -->
  <div id="lista">
    <div class="card-form">
      <div class="header-form">
        <h3>Solicitudes</h3>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Laboratorio</th>
              <th>Solicitante</th>
              <th>Tipo</th>
              <th>Cantidad</th>
              <th>Descripción</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="tablaSolicitudes"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
function mostrarNueva() {
  document.getElementById("nueva").style.display = "block";
  document.getElementById("lista").style.display = "none";
  btnNueva.classList.add("active");
  btnLista.classList.remove("active");
}

function mostrarLista() {
  document.getElementById("nueva").style.display = "none";
  document.getElementById("lista").style.display = "block";
  btnLista.classList.add("active");
  btnNueva.classList.remove("active");
  cargarSolicitudes();
}

function guardarSolicitud() {
  const solicitud = {
    laboratorio: document.getElementById("laboratorio").value,
    nombre: document.getElementById("nombre").value,
    tipo: document.getElementById("tipo").value,
    cantidad: document.getElementById("cantidad").value,
    descripcion: document.getElementById("descripcion").value,
    estado: "En espera"
  };

  let solicitudes = JSON.parse(localStorage.getItem("solicitudes")) || [];
  solicitudes.push(solicitud);
  localStorage.setItem("solicitudes", JSON.stringify(solicitudes));

  alert("Solicitud guardada");
  mostrarLista();
}

function cargarSolicitudes() {
  let solicitudes = JSON.parse(localStorage.getItem("solicitudes")) || [];
  let tabla = document.getElementById("tablaSolicitudes");
  tabla.innerHTML = "";

  solicitudes.forEach(s => {
    tabla.innerHTML += `
      <tr>
        <td>${s.laboratorio}</td>
        <td>${s.nombre}</td>
        <td>${s.tipo}</td>
        <td>${s.cantidad}</td>
        <td>${s.descripcion}</td>
        <td><span class="estado espera">${s.estado}</span></td>
      </tr>
    `;
  });
}

// Mostrar lista por defecto
mostrarLista();
</script>

</body>
</html>
