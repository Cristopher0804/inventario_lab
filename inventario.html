<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario de Equipos - CBTIS 258</title>

<style>

*{
box-sizing:border-box;
font-family:'Poppins',sans-serif;
margin:0;
padding:0;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#f0eaff,#e6e0ff,#f0f0ff);
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

/* TOP BAR */

.top-bar{
width:100%;
max-width:1200px;
background:white;
padding:20px;
border-radius:25px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 35px rgba(110,51,255,0.1);
margin-bottom:30px;
border-left:5px solid #6E33FF;
flex-wrap:wrap;
gap:15px;
}

/* LOGO */

.logo-area{
display:flex;
align-items:center;
gap:12px;
}

.logo-img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
border:3px solid #6E33FF;
box-shadow:0 5px 12px rgba(0,0,0,0.2);
}

.logo-text{
font-weight:800;
color:#6E33FF;
font-size:24px;
}

/* MENU */

.menu{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.menu button{
background:#f4efff;
border:none;
padding:10px 18px;
border-radius:30px;
font-weight:700;
cursor:pointer;
transition:0.3s;
font-size:14px;
}

.menu button:hover{
background:#6E33FF;
color:white;
transform:scale(1.05);
}

.menu .active{
background:linear-gradient(90deg,#6E33FF,#A17BFF);
color:white;
}

.menu .btn-salir{
background:linear-gradient(90deg,#FF3B3B,#FF6B6B);
color:white;
font-weight:800;
}

/* CARD INVENTARIO */

.card-inventario{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
border-radius:25px;
padding:25px;
width:100%;
max-width:1200px;
box-shadow:0 25px 60px rgba(110,51,255,0.1);
}

.card-inventario h3{
font-size:24px;
color:#6E33FF;
margin-bottom:20px;
border-bottom:2px solid #A17BFF;
padding-bottom:8px;
text-align:center;
}

/* CONTENEDOR DE TARJETAS */

.tarjetas-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* TARJETA INDIVIDUAL */

.tarjeta{
background:#fdfdff;
border-radius:20px;
padding:20px;
box-shadow:0 10px 25px rgba(110,51,255,0.1);
display:flex;
flex-direction:column;
gap:10px;
transition:transform 0.3s;
}

.tarjeta:hover{
transform:scale(1.03);
}

.tarjeta h4{
color:#6E33FF;
font-size:18px;
margin-bottom:8px;
border-bottom:1px solid #A17BFF;
padding-bottom:4px;
}

.tarjeta p{
font-size:14px;
color:#333;
margin:0;
}

.tarjeta .lab{
font-weight:700;
color:#A17BFF;
}

/* RESPONSIVE */

@media (max-width:800px){
.logo-text{
font-size:20px;
}
}

@media (max-width:500px){
.top-bar{
flex-direction:column;
align-items:center;
text-align:center;
}

.menu{
justify-content:center;
}

.menu button{
padding:8px 14px;
font-size:13px;
}
}

</style>
</head>

<body>

<!-- BARRA SUPERIOR -->

<div class="top-bar">

<div class="logo-area">
<img src="logo_cbtis.jpg" class="logo-img">
<div class="logo-text">CBTIS 258</div>
</div>

<div class="menu">
<button onclick="window.location.href='registro.html'">Registro</button>
<button onclick="window.location.href='solicitud.html'">Solicitudes</button>
<button onclick="window.location.href='laboratorios.html'">Laboratorios</button>
<button class="active" onclick="window.location.href='inventario.html'">Equipos</button>
<button class="btn-salir" onclick="window.location.href='menu.html'">Salir</button>
</div>

</div>

<!-- CARD INVENTARIO -->

<div class="card-inventario">
<h3>Inventario de Equipos</h3>

<div class="tarjetas-container" id="tarjetas-equipos">
<!-- Tarjetas se generarán aquí -->
</div>

</div>

<script>

let equipos = JSON.parse(localStorage.getItem("equipos")) || {"1":[],"2":[],"3":[]};

function cargarTarjetas(){
  const contenedor = document.getElementById("tarjetas-equipos");
  contenedor.innerHTML = "";

  for(let lab in equipos){
    equipos[lab].forEach(e => {
      const div = document.createElement("div");
      div.classList.add("tarjeta");
      div.innerHTML = `
        <h4>${e.categoria}</h4>
        <p><strong>Marca:</strong> ${e.marca}</p>
        <p><strong>Modelo:</strong> ${e.modelo}</p>
        <p><strong>Número de Serie:</strong> ${e.serie}</p>
        <p class="lab"><strong>Laboratorio:</strong> ${lab}</p>
        <p><strong>Fecha de Recepción:</strong> ${e.fecha}</p>
      `;
      contenedor.appendChild(div);
    });
  }
}

// Cargar tarjetas al inicio
cargarTarjetas();

</script>

</body>
</html>
