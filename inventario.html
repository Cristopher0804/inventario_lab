<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario de Equipos - CBTIS 258</title>

<style>

*{
box-sizing:border-box;
font-family:'Poppins',sans-serif;
margin:0;
padding:0;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#f0eaff,#e6e0ff,#f0f0ff);
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

/* TOP BAR */

.top-bar{
width:100%;
max-width:1200px;
background:white;
padding:20px;
border-radius:25px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 35px rgba(110,51,255,0.1);
margin-bottom:30px;
border-left:5px solid #6E33FF;
flex-wrap:wrap;
gap:15px;
}

/* LOGO */

.logo-area{
display:flex;
align-items:center;
gap:12px;
}

.logo-img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
border:3px solid #6E33FF;
box-shadow:0 5px 12px rgba(0,0,0,0.2);
}

.logo-text{
font-weight:800;
color:#6E33FF;
font-size:24px;
}

/* MENU */

.menu{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.menu button{
background:#f4efff;
border:none;
padding:10px 18px;
border-radius:30px;
font-weight:700;
cursor:pointer;
transition:0.3s;
font-size:14px;
}

.menu button:hover{
background:#6E33FF;
color:white;
transform:scale(1.05);
}

.menu .active{
background:linear-gradient(90deg,#6E33FF,#A17BFF);
color:white;
}

.menu .btn-salir{
background:linear-gradient(90deg,#FF3B3B,#FF6B6B);
color:white;
font-weight:800;
}

/* CARD / TABLA */

.card-inventario{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
border-radius:25px;
padding:25px;
width:100%;
max-width:900px;
box-shadow:0 25px 60px rgba(110,51,255,0.1);
overflow-x:auto;
}

.card-inventario h3{
font-size:24px;
color:#6E33FF;
margin-bottom:20px;
border-bottom:2px solid #A17BFF;
padding-bottom:8px;
}

table{
width:100%;
border-collapse:collapse;
min-width:600px;
}

th, td{
padding:12px 10px;
text-align:left;
border-bottom:1px solid #ddd;
font-size:14px;
}

th{
background:#f4efff;
color:#6E33FF;
font-weight:700;
}

tr:hover{
background:#f0eaff;
}

/* RESPONSIVE */

@media (max-width:800px){
.logo-text{
font-size:20px;
}
}

@media (max-width:500px){
.top-bar{
flex-direction:column;
align-items:center;
text-align:center;
}

.menu{
justify-content:center;
}

.menu button{
padding:8px 14px;
font-size:13px;
}
}

</style>
</head>

<body>

<!-- BARRA SUPERIOR -->

<div class="top-bar">

<div class="logo-area">
<img src="logo_cbtis.jpg" class="logo-img">
<div class="logo-text">CBTIS 258</div>
</div>

<div class="menu">
<button onclick="window.location.href='registro.html'">Registro</button>
<button onclick="window.location.href='solicitud.html'">Solicitudes</button>
<button onclick="window.location.href='laboratorios.html'">Laboratorios</button>
<button class="active" onclick="window.location.href='inventario.html'">Equipos</button>
<button class="btn-salir" onclick="window.location.href='menu.html'">Salir</button>
</div>

</div>

<!-- CARD INVENTARIO -->

<div class="card-inventario">
<h3>Inventario de Equipos</h3>

<table id="tabla-equipos">
<thead>
<tr>
<th>Categoría</th>
<th>Marca</th>
<th>Modelo</th>
<th>Número de Serie</th>
<th>Laboratorio</th>
<th>Fecha de Recepción</th>
</tr>
</thead>
<tbody>
<!-- Equipos se cargarán aquí -->
</tbody>
</table>
</div>

<script>

let equipos = JSON.parse(localStorage.getItem("equipos")) || {"1":[],"2":[],"3":[]};

function cargarTabla(){
const tbody = document.getElementById("tabla-equipos").querySelector("tbody");
tbody.innerHTML = "";

for(let lab in equipos){
  equipos[lab].forEach(e => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${e.categoria}</td>
      <td>${e.marca}</td>
      <td>${e.modelo}</td>
      <td>${e.serie}</td>
      <td>${lab}</td>
      <td>${e.fecha}</td>
    `;
    tbody.appendChild(tr);
  });
}
}

// Cargar tabla al inicio
cargarTabla();

</script>

</body>
</html>
