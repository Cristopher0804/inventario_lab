<style>
* { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin:0; padding:0; }

body {
  min-height: 100vh;
  background: linear-gradient(135deg,#f0eaff,#e6e0ff,#f0f0ff);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* TOP BAR */

.top-bar{
  width: 100%;
  max-width: 1200px;
  background:white;
  padding:15px 20px;
  border-radius:25px;
  display:flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
  box-shadow:0 10px 35px rgba(110,51,255,0.1);
  border-left: 5px solid #6E33FF;
  margin-bottom: 30px;
}

/* LOGO */

.logo-area{
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink: 0;
}

.logo-img{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #6E33FF;
  box-shadow:0 5px 12px rgba(0,0,0,0.2);
}

.logo-text{
  font-weight:800;
  color:#6E33FF;
  font-size:20px;
}

/* MENU */

.menu{ 
  display:flex; 
  gap:10px; 
  flex-wrap: wrap; 
  justify-content: flex-end;
}

.menu button{
  background:#f4efff;
  border:none;
  padding:10px 20px;
  border-radius:30px;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
  font-size:14px;
}

.menu button:hover{
  background:#6E33FF;
  color:white;
  transform: scale(1.05);
}

.menu .active{
  background: linear-gradient(90deg,#6E33FF,#A17BFF);
  color:white;
  transform: scale(1.05);
}

.menu .btn-salir{
  background: linear-gradient(90deg,#FF3B3B,#FF6B6B);
  color: white;
  font-weight: 800;
}

.menu .btn-salir:hover{
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(255,59,59,0.5);
}

/* FORMULARIO */

.card-form{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  border-radius:25px;
  padding:35px;
  width:100%;
  max-width:900px;
  box-shadow:0 25px 60px rgba(110,51,255,0.1);
}

.header-form h3{
  font-size:24px;
  color:#6E33FF;
  margin-bottom:25px;
  border-bottom:2px solid #A17BFF;
  padding-bottom:8px;
}

/* GRID FORM */

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

label{
  font-size:12px;
  font-weight:700;
  color:#555;
  text-transform:uppercase;
  margin-bottom:6px;
  display:block;
}

input,select{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:2px solid #eee;
  background:#fcfcfc;
  font-size:14px;
}

input:focus,select:focus{
  border-color:#6E33FF;
  outline:none;
  background:white;
}

.btn-submit{
  grid-column:span 2;
  background:linear-gradient(90deg,#6E33FF,#A17BFF);
  color:white;
  border:none;
  padding:18px;
  border-radius:20px;
  font-weight:800;
  font-size:15px;
  cursor:pointer;
}

/* MEDIA QUERIES RESPONSIVE */

@media (max-width: 768px){
  .logo-text{ font-size:18px; }
  .menu button{ padding:8px 15px; font-size:13px; }
  .top-bar{ flex-direction: column; align-items: flex-start; gap: 10px; padding:15px; }
  .menu{ justify-content: flex-start; width: 100%; }
  .form-grid{ grid-template-columns:1fr; }
  .btn-submit{ grid-column:span 1; }
}

@media (max-width: 480px){
  .logo-img{ width:35px; height:35px; }
  .logo-text{ font-size:16px; }
  .menu button{ padding:6px 12px; font-size:12px; }
}
</style>
