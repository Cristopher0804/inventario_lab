<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario Total - CBTIS 258</title>

<style>
* { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin:0; padding:0; }

body {
min-height: 100vh;
background: linear-gradient(135deg,#f0eaff,#e6e0ff,#f0f0ff);
background-size: 400% 400%;
animation: gradient 15s ease infinite;
display: flex;
flex-direction: column;
align-items: center;
padding: 20px;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* TOP BAR */

.top-bar{
width: 100%;
max-width: 1200px;
background:white;
padding:15px 30px;
border-radius:25px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 35px rgba(110,51,255,0.1);
border-left: 5px solid #6E33FF;
margin-bottom: 30px;
flex-wrap: wrap;
}

/* LOGO */

.logo-area{
display:flex;
align-items:center;
gap:12px;
}

.logo-img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
border:3px solid #6E33FF;
box-shadow:0 5px 12px rgba(0,0,0,0.2);
}

.logo-text{
font-weight:800;
color:#6E33FF;
font-size:26px;
}

/* MENU */

.menu{ display:flex; gap:10px; flex-wrap: wrap; }

.menu button{
background:#f4efff;
border:none;
padding:10px 20px;
border-radius:30px;
font-weight:700;
cursor:pointer;
transition:0.3s;
white-space: nowrap;
}

.menu button:hover{
background:#6E33FF;
color:white;
transform: scale(1.05);
}

.menu .active{
background: linear-gradient(90deg,#6E33FF,#A17BFF);
color:white;
transform: scale(1.05);
}

.menu .btn-salir{
background: linear-gradient(90deg,#FF3B3B,#FF6B6B);
color: white;
font-weight: 800;
}

.menu .btn-salir:hover{
transform: scale(1.05);
box-shadow: 0 10px 25px rgba(255,59,59,0.5);
}

/* ESTADÍSTICAS */

.stats{
width: 100%;
max-width: 1200px;
display: grid;
grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
gap: 20px;
margin-bottom: 30px;
}

.stat-card{
background: linear-gradient(145deg, #6E33FF, #A17BFF);
color: white;
border-radius: 25px;
padding: 20px;
text-align: center;
box-shadow: 0 15px 40px rgba(110,51,255,0.2);
position: relative;
overflow: hidden;
transition: transform 0.3s, box-shadow 0.3s;
}

.stat-card:hover{
transform: translateY(-5px);
box-shadow: 0 25px 50px rgba(110,51,255,0.25);
}

.stat-card h3{ font-size:24px; margin-bottom:8px; }

.progress{
background: rgba(255,255,255,0.3);
height: 8px;
border-radius: 10px;
margin-top: 8px;
overflow: hidden;
}

.progress-fill{
background: rgba(255,255,255,0.8);
height: 100%;
width: 0%;
border-radius: 10px;
transition: width 0.6s ease;
}

/* CONTENEDOR */

.container{
max-width: 1000px;
width: 100%;
padding:0 10px;
}

/* BUSCADOR */

.search-box{
background:white;
padding:15px;
border-radius:25px;
margin-bottom:20px;
box-shadow:0 15px 35px rgba(110,51,255,0.08);
}

.search-box input{
width:100%;
padding:12px;
border-radius:15px;
border:2px solid #eee;
font-size:14px;
transition:0.3s;
}

.search-box input:focus{
border-color:#6E33FF;
outline:none;
box-shadow:0 0 15px rgba(110,51,255,0.1);
}

/* TARJETAS */

.card{
background:white;
border-radius:25px;
padding:20px;
margin-bottom:15px;
box-shadow:0 20px 50px rgba(0,0,0,0.05);
border-left:5px solid #6E33FF;
position:relative;
transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover{
transform: translateY(-5px);
box-shadow:0 25px 50px rgba(110,51,255,0.1);
}

.lab-tag{
font-size:12px;
font-weight:700;
background:#f4efff;
padding:5px 12px;
border-radius:12px;
display:inline-block;
margin-bottom:10px;
}

.btn-eliminar{
position:absolute;
bottom:15px;
right:15px;
background:#ff6b6b;
color:white;
border:none;
padding:8px 15px;
border-radius:12px;
cursor:pointer;
font-size:13px;
transition:0.3s;
}

.btn-eliminar:hover{ background:#ff3b3b; }

.empty{
background:white;
padding:50px;
border-radius:25px;
text-align:center;
box-shadow:0 25px 60px rgba(0,0,0,0.05);
}

.empty h3{ color:#6E33FF; font-size:22px; margin-bottom:10px; }

/* RESPONSIVE */

@media (max-width: 768px) {
.top-bar{ flex-direction: column; gap:15px; }
.menu{ justify-content: center; }
.stats{ grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); }
}
</style>
</head>

<body>

<!-- TOP BAR -->

<div class="top-bar">

<div class="logo-area">
<img src="logo_cbtis.jpg" class="logo-img">
<div class="logo-text">CBTIS 258</div>
</div>

<div class="menu">
<button onclick="window.location.href='registro.html'">Registro</button>
<button onclick="window.location.href='solicitud.html'">Solicitudes</button>
<button onclick="window.location.href='laboratorios.html'">Laboratorios</button>
<button class="active" onclick="window.location.href='inventario.html'">Equipos</button>
<button class="btn-salir" onclick="window.location.href='menu.html'">Salir</button>
</div>

</div>

<!-- ESTADÍSTICAS -->

<div class="stats">

<div class="stat-card">
<h3 id="totalEquipos">0</h3>
<p>Total de Equipos</p>
<div class="progress"><div id="totalProgress" class="progress-fill"></div></div>
</div>

<div class="stat-card">
<h3 id="lab1Count">0</h3>
<p>Equipos Lab 1</p>
<div class="progress"><div id="lab1Progress" class="progress-fill"></div></div>
</div>

<div class="stat-card">
<h3 id="lab2Count">0</h3>
<p>Equipos Lab 2</p>
<div class="progress"><div id="lab2Progress" class="progress-fill"></div></div>
</div>

<div class="stat-card">
<h3 id="lab3Count">0</h3>
<p>Equipos Lab 3</p>
<div class="progress"><div id="lab3Progress" class="progress-fill"></div></div>
</div>

</div>

<!-- CONTENEDOR -->

<div class="container">

<div class="search-box">
<input type="text" id="buscador" placeholder="Buscar por serie, marca o modelo..." onkeyup="buscarEquipo()">
</div>

<div id="contenedor"></div>

</div>

<script>
let equipos = JSON.parse(localStorage.getItem("equipos")) || {"1":[],"2":[],"3":[]};

function obtenerLista(){
let lista=[];
for(let lab in equipos){
equipos[lab].forEach((eq,idx)=>{
lista.push({...eq,lab});
});
}
return lista;
}

function renderEquipos(lista){
const contenedor=document.getElementById("contenedor");
contenedor.innerHTML="";
if(lista.length===0){
contenedor.innerHTML=`<div class="empty">
<h3>No hay equipos registrados</h3>
<p>Los equipos aparecerán aquí cuando sean registrados.</p>
</div>`;
return;
}
lista.forEach((eq,index)=>{
contenedor.innerHTML+=`
<div class="card">
<div class="lab-tag">Laboratorio ${eq.lab}</div>
<div><b>Categoría:</b> ${eq.categoria}</div>
<div><b>Marca:</b> ${eq.marca}</div>
<div><b>Modelo:</b> ${eq.modelo}</div>
<div><b>Número de Serie:</b> ${eq.serie}</div>
<div><b>Fecha:</b> ${eq.fecha}</div>
<button class="btn-eliminar" onclick="eliminarEquipo('${eq.lab}',${index})">Eliminar</button>
</div>
`;
});
actualizarStats();
}

function eliminarEquipo(lab,index){
if(confirm("¿Eliminar este equipo?")){
equipos[lab].splice(index,1);
localStorage.setItem("equipos",JSON.stringify(equipos));
renderEquipos(obtenerLista());
}
}

function buscarEquipo(){
let texto=document.getElementById("buscador").value.toLowerCase();
let lista=obtenerLista().filter(eq=>{
return eq.serie.toLowerCase().includes(texto) ||
eq.marca.toLowerCase().includes(texto) ||
eq.modelo.toLowerCase().includes(texto);
});
renderEquipos(lista);
}

function actualizarStats(){
let total=0;
for(let lab in equipos) total+=equipos[lab].length;
document.getElementById("totalEquipos").textContent=total;
document.getElementById("lab1Count").textContent=equipos["1"].length;
document.getElementById("lab2Count").textContent=equipos["2"].length;
document.getElementById("lab3Count").textContent=equipos["3"].length;
let max=total||1;
document.getElementById("totalProgress").style.width=(total/max*100)+"%";
document.getElementById("lab1Progress").style.width=(equipos["1"].length/max*100)+"%";
document.getElementById("lab2Progress").style.width=(equipos["2"].length/max*100)+"%";
document.getElementById("lab3Progress").style.width=(equipos["3"].length/max*100)+"%";
}

renderEquipos(obtenerLista());
</script>

</body>
</html>
