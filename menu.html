<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú del Sistema</title>

<style>

:root{
--primary:#6E33FF;
--secondary:#FF6733;
--bg:#FDF9F0;
}

body{
font-family:'Poppins',sans-serif;
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#fdf9f0,#e6e0ff,#fdf9f0,#fff5f0);
background-size:400% 400%;
animation:gradient 15s ease infinite;
position:relative;
overflow:hidden;
padding:20px;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:radial-gradient(circle,#ffffff55 1px,transparent 1px);
background-size:40px 40px;
opacity:.4;
}

.menu-card{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
padding:40px;
border-radius:30px;
border:1px solid rgba(110,51,255,0.2);
box-shadow:0 20px 50px rgba(0,0,0,0.1);
max-width:600px;
width:100%;
text-align:center;
animation:entrada .8s ease;
z-index:1;
}

@keyframes entrada{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
color:#222;
margin-bottom:30px;
font-weight:800;
}

.menu-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.menu-item{
background:white;
border-radius:20px;
padding:20px;
cursor:pointer;
border:2px solid #eee;
transition:.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.menu-item:hover{
transform:translateY(-5px) scale(1.03);
border-color:var(--primary);
box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

.menu-img{
width:100%;
max-height:120px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}

.menu-title{
font-weight:bold;
font-size:18px;
color:#333;
}

.back-btn{
margin-top:25px;
padding:12px 25px;
border:none;
border-radius:12px;
background:var(--primary);
color:white;
font-size:14px;
cursor:pointer;
transition:.3s;
}

.back-btn:hover{
background:#5526cc;
transform:scale(1.05);
}

.footer{
margin-top:20px;
font-size:12px;
color:#999;
}

@media(max-width:500px){
.menu-grid{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="menu-card">

<h1>Inventario de laboratorios</h1>

<div class="menu-grid">

<div class="menu-item" onclick="window.location.href='registro.html'">
<img src="1compu.jpg" class="menu-img">
<div class="menu-title">Almacén</div>
</div>

<div class="menu-item" onclick="window.location.href='reportes.html'">
<img src="1reporte.jpg" class="menu-img">
<div class="menu-title">Reportes</div>
</div>

</div>

<button class="back-btn" onclick="window.location.href='index.html'">
⬅ Regresar
</button>

<p class="footer">Sistema de Control de Laboratorios • CBTIS 258</p>

</div>

</body>
</html>
