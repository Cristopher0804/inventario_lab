<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Administrativo - Reportes</title>

<style>
* { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin:0; padding:0; }

body{
  min-height:100vh;
  background: linear-gradient(135deg,#f0eaff,#e6e0ff,#f0f0ff);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  display:flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* TOP BAR */

.top-bar{
  width:100%;
  max-width:1200px;
  background:white;
  padding:20px 40px;
  border-radius:25px;
  display:flex;
  justify-content: space-between;
  align-items:center;
  box-shadow:0 10px 35px rgba(110,51,255,0.1);
  margin-bottom:40px;
  border-left:5px solid #6E33FF;
}

/* LOGO */

.logo-area{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-img{
  width:50px;
  height:50px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #6E33FF;
  box-shadow:0 5px 12px rgba(0,0,0,0.2);
}

.logo-text{
  font-weight:800;
  color:#6E33FF;
  font-size:26px;
}

/* BOTON SALIR */

.btn-salir{
  background:linear-gradient(90deg,#FF3B3B,#FF6B6B);
  color:white;
  font-weight:800;
  border:none;
  padding:12px 25px;
  border-radius:30px;
  cursor:pointer;
  transition:0.3s;
}

.btn-salir:hover{
  transform:scale(1.05);
  box-shadow:0 10px 25px rgba(255,59,59,0.5);
}

/* CONTAINER TARJETAS */

.container{
  width: 100%;
  max-width: 1200px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
  margin: 0 auto;
}

/* TARJETAS */

.card{
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  border-radius:25px;
  padding:25px;
  box-shadow:0 25px 60px rgba(110,51,255,0.1);
  border-left:4px solid #FFB020;
  display:flex;
  flex-direction:column;
  transition:transform 0.3s;
}

.card:hover{transform:translateY(-3px);}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.equipo{
  font-weight:700;
  font-size:16px;
}

.estado{
  padding:6px 12px;
  border-radius:12px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  border:none;
}

.estado.en-espera{background:#ffe08a;}
.estado.en-proceso{background:#ffb86c;}
.estado.arreglado{background:#6fcf97;color:white;}

.info{
  display:flex;
  gap:30px;
  margin:15px 0;
  font-size:14px;
}

.descripcion{
  background:#f7f7f7;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

.btn-eliminar{
  align-self:flex-end;
  background:#ff6b6b;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:12px;
  cursor:pointer;
  font-size:12px;
  transition:0.3s;
  margin-top:10px;
}

.btn-eliminar:hover{background:#ff3b3b;}

/* VACIO */

.empty{
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  padding:60px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 25px 60px rgba(110,51,255,0.1);
}

.empty-icon{font-size:60px;margin-bottom:10px;}

</style>
</head>

<body>

<!-- BARRA SUPERIOR -->

<div class="top-bar">

  <div class="logo-area">
    <img src="logo_cbtis.jpg" alt="Logo" class="logo-img">
    <div class="logo-text">CBTIS Panel</div>
  </div>

  <button class="btn-salir">Salir</button>
</div>

<!-- CONTENEDOR DE TARJETAS -->

<div class="container">
  <div class="card">
    <div class="header">
      <span class="equipo">Equipo 1</span>
      <button class="estado en-espera">En espera</button>
    </div>
    <div class="info">
      <div>Reporte #001</div>
      <div>Fecha: 10/03/2026</div>
    </div>
    <div class="descripcion">Problema con la impresora.</div>
    <button class="btn-eliminar">Eliminar</button>
  </div>

  <div class="card">
    <div class="header">
      <span class="equipo">Equipo 2</span>
      <button class="estado en-proceso">En proceso</button>
    </div>
    <div class="info">
      <div>Reporte #002</div>
      <div>Fecha: 11/03/2026</div>
    </div>
    <div class="descripcion">Falla en la red.</div>
    <button class="btn-eliminar">Eliminar</button>
  </div>
</div>

</body>
</html>
