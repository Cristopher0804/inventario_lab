<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Administrativo - Reportes</title>

<style>
* { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin:0; padding:0; }

body{
  min-height:100vh;
  background: linear-gradient(135deg,#f0eaff,#e6e0ff,#f0f0ff);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  display:flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* TOP BAR */
.top-bar{
  width:100%;
  max-width:1200px;
  background:white;
  padding:20px 40px;
  border-radius:25px;
  display:flex;
  justify-content: space-between;
  align-items:center;
  box-shadow:0 10px 35px rgba(110,51,255,0.1);
  margin-bottom:40px;
  border-left:5px solid #6E33FF;
}

/* LOGO */
.logo-area{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-img{
  width:50px;
  height:50px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #6E33FF;
  box-shadow:0 5px 12px rgba(0,0,0,0.2);
}

.logo-text{
  font-weight:800;
  color:#6E33FF;
  font-size:26px;
}

/* BOTON SALIR */
.btn-salir{
  background:linear-gradient(90deg,#FF3B3B,#FF6B6B);
  color:white;
  font-weight:800;
  border:none;
  padding:12px 25px;
  border-radius:30px;
  cursor:pointer;
  transition:0.3s;
}

.btn-salir:hover{
  transform:scale(1.05);
  box-shadow:0 10px 25px rgba(255,59,59,0.5);
}

/* CONTENEDOR TARJETAS */
.container{
  width: 100%;
  max-width: 1000px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin: 0 auto;
}

/* TARJETAS */
.card{
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  border-radius:25px;
  padding:25px;
  box-shadow:0 25px 60px rgba(110,51,255,0.1);
  border-left:4px solid #FFB020;
  display:flex;
  flex-direction:column;
  transition:transform 0.3s;
}

.card:hover{transform:translateY(-3px);}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap: wrap;
}

.equipo{
  font-weight:700;
  font-size:16px;
}

.estado{
  padding:6px 12px;
  border-radius:12px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  border:none;
}

.estado.en-espera{background:#ffe08a;}
.estado.en-proceso{background:#ffb86c;}
.estado.arreglado{background:#6fcf97;color:white;}

.info{
  display:flex;
  gap:30px;
  margin:15px 0;
  font-size:14px;
  flex-wrap: wrap;
}

.descripcion{
  background:#f7f7f7;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

.btn-eliminar{
  align-self:flex-end;
  background:#ff6b6b;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:12px;
  cursor:pointer;
  font-size:12px;
  transition:0.3s;
  margin-top:10px;
}

.btn-eliminar:hover{background:#ff3b3b;}

/* VACIO */
.empty{
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  padding:60px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 25px 60px rgba(110,51,255,0.1);
}

.empty-icon{font-size:60px;margin-bottom:10px;}

@media(min-width:768px){
  .container{
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
  }
  .card{
    width: 45%;
  }
}

@media(min-width:1200px){
  .card{
    width: 30%;
  }
}
</style>
</head>

<body>

<!-- BARRA SUPERIOR -->
<div class="top-bar">
  <div class="logo-area">
    <img src="logo_cbtis.jpg" alt="Logo" class="logo-img">
    <div class="logo-text">CBTIS 258</div>
  </div>
  <button class="btn-salir" onclick="window.location.href='index.html'">Salir</button>
</div>

<!-- CONTENEDOR -->
<div class="container" id="contenedor"></div>

<script>
let reportes = JSON.parse(localStorage.getItem("reportes")) || []
let contenedor = document.getElementById("contenedor")

function guardarReportes(){
  localStorage.setItem("reportes", JSON.stringify(reportes))
  renderReportes()
}

function cambiarEstado(index, estadoSelect){
  reportes[index].estado = estadoSelect.value
  guardarReportes()
}

function eliminarReporte(index){
  if(confirm("¿Deseas eliminar este reporte?")){
    reportes.splice(index,1)
    guardarReportes()
  }
}

function renderReportes(){
  contenedor.innerHTML=""

  if(reportes.length===0){
    contenedor.innerHTML=`
      <div class="empty">
        <div class="empty-icon">📭</div>
        <h3>No hay reportes todavía</h3>
        <p>Cuando los alumnos reporten fallas aparecerán aquí.</p>
      </div>
    `
  } else {
    reportes.forEach((r,i)=>{
      let estado=r.estado||"En Espera"
      let claseEstado=estado.toLowerCase().replace(" ","-")
      contenedor.innerHTML+=`
      <div class="card">
        <div class="header">
          <div class="equipo">Equipo: ${r.serie}</div>
          <select class="estado ${claseEstado}" onchange="cambiarEstado(${i}, this)">
            <option value="En Espera" ${estado==="En Espera"?"selected":""}>En Espera</option>
            <option value="En Proceso" ${estado==="En Proceso"?"selected":""}>En Proceso</option>
            <option value="Arreglado" ${estado==="Arreglado"?"selected":""}>Arreglado</option>
          </select>
        </div>
        <div class="info">
          <div>👤 ${r.nombre}</div>
          <div>📅 ${r.fecha}</div>
          <div>⏰ ${r.hora}</div>
        </div>
        <div class="descripcion">
          <b>Descripción de la falla:</b><br>
          ${r.descripcion}
        </div>
        <button class="btn-eliminar" onclick="eliminarReporte(${i})">Eliminar</button>
      </div>
      `
    })
  }
}

renderReportes()
</script>

</body>
</html>
