<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reporte de Falla - CBTIS 258</title>

<style>
body{ 
  font-family:'Poppins',sans-serif;
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#FDF9F0 0%,#FFF5F0 100%);
  overflow-x:hidden;
}

/* Logo */
.logo{
  width:200px;
  max-width:50%;
  height:auto;
  display:block;
  margin:0 auto 20px auto;
  border-radius: 120px;
}

/* Fondos circulares */
.bg-circle{
  position:absolute;
  border-radius:50%;
  filter:blur(100px);
  opacity:0.15;
  z-index:-1;
}
.bg-circle.orange{ background:linear-gradient(135deg,#FF6733,#FF8E66);}
.bg-circle.purple{ background:#6E33FF;}

/* Tarjeta */
.card-report{
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(18px);
  padding:45px 35px;
  border-radius:30px;
  border:1px solid rgba(255,103,51,0.2);
  box-shadow:0 30px 60px rgba(110,51,255,0.08);
  width:420px;
  max-width:90%;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition: transform 0.4s, box-shadow 0.4s;
}
.card-report:hover{ 
  transform: translateY(-5px); 
  box-shadow:0 35px 70px rgba(110,51,255,0.15);
}

/* Encabezado */
.header-report{
  text-align:center;
  margin-bottom:30px;
}
.header-report h2{
  color:#333;
  font-weight:800;
  margin:0;
  font-size:28px;
}
.header-report p{
  color:#FF6733;
  font-weight:600;
  font-size:14px;
  margin-top:5px;
  text-transform:uppercase;
}

/* Inputs */
.input-group {
  position: relative;
  margin-bottom: 25px;
  width: 100%;
  max-width: 360px;
}

.input-group input,
.input-group textarea {
  width: 100%;
  padding: 16px;
  border: 2px solid #F0F0F0;
  border-radius: 18px;
  background: #FFF;
  font-size: 14px;
  outline: none;
  transition: border 0.3s, box-shadow 0.3s;
}

.input-group label {
  position: absolute;
  left: 16px;
  top: 16px;
  color: #888;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  pointer-events: none;
  transition: 0.3s;
  background: white;
  padding: 0 5px;
}

.input-group input:focus,
.input-group textarea:focus {
  border-color: #FF6733;
  box-shadow: 0 0 15px rgba(255,103,51,0.12);
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label,
.input-group textarea:focus + label,
.input-group textarea:not(:placeholder-shown) + label {
  top: -10px;
  font-size: 10px;
  color: #FF6733;
}

/* Botones */
.btn-container{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:15px;
  width:100%;
  max-width:360px;
}

.btn-enviar{
  background:linear-gradient(90deg,#FF6733,#FF8E66);
  color:white;
  border:none;
  padding:18px;
  flex:2;
  border-radius:18px;
  cursor:pointer;
  font-weight:800;
  font-size:16px;
  box-shadow:0 12px 25px rgba(255,103,51,0.3);
  transition:0.3s;
}

.btn-enviar:hover{
  transform:translateY(-3px);
}

.btn-volver{
  background:white;
  color:#666;
  border:2px solid #EEE;
  padding:18px;
  flex:1;
  border-radius:18px;
  cursor:pointer;
  font-weight:700;
}

/* Diseño responsivo */
@media screen and (max-width: 480px){
  .card-report{
    width:90%;
    padding:30px 20px;
  }
  .logo{
    width:120px;
    margin-bottom:15px;
  }
  .header-report h2{
    font-size:20px;
  }
  .header-report p{
    font-size:12px;
  }
  .input-group input,
  .input-group textarea{
    padding:12px;
    font-size:13px;
  }
  .input-group label{
    font-size:10px;
  }
  .btn-enviar, .btn-volver{
    padding:12px;
    font-size:14px;
  }
  .btn-container{
    flex-direction:column;
    gap:10px;
  }
}
</style>
</head>

<body>

<div class="bg-circle orange" style="width:300px;height:300px;top:-50px;right:-50px;"></div>
<div class="bg-circle purple" style="width:200px;height:200px;bottom:-50px;left:-50px;"></div>

<div class="card-report">

<!-- LOGO -->
<img class="logo" src="logo_cbtis.jpg" alt="Logo CBTIS 258">

<div class="header-report">
<h2>Reportar Falla</h2>
<p>Atención Técnica Inmediata</p>
</div>

<div class="input-group">
<input type="text" id="nombre" placeholder=" " required>
<label>Nombre del Alumno</label>
</div>

<div class="input-group">
<input type="text" id="serie" placeholder=" " required>
<label>Número de Serie del Equipo (S/N)</label>
</div>

<div class="input-group">
<textarea id="descripcion" placeholder=" " required></textarea>
<label>Descripción del Problema</label>
</div>

<div class="btn-container">
<button class="btn-volver" onclick="window.location.href='index.html'">VOLVER</button>
<button class="btn-enviar" onclick="enviarReporte()">ENVIAR REPORTE</button>
</div>

</div>

<script>
function enviarReporte(){

let nombre = document.getElementById("nombre").value.trim();
let serie = document.getElementById("serie").value.trim();
let descripcion = document.getElementById("descripcion").value.trim();

if(!nombre || !serie || !descripcion){
alert("Por favor llena todos los campos");
return;
}

let fecha = new Date().toISOString().split("T")[0];
let hora = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

let reporte = { nombre, serie, descripcion, fecha, hora };

let reportes = JSON.parse(localStorage.getItem("reportes")) || [];
reportes.push(reporte);

localStorage.setItem("reportes", JSON.stringify(reportes));

alert("Tu reporte ha sido enviado.");

document.getElementById("nombre").value="";
document.getElementById("serie").value="";
document.getElementById("descripcion").value="";
}
</script>

</body>
</html>
