<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportar Falla - CBTIS 258</title>

<style>
:root{
  --primary:#6E33FF;
  --secondary:#FF6733;
  --bg:#FDF9F0;
}

body{
  font-family:'Poppins',sans-serif;
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(-45deg,#fdf9f0,#e6e0ff,#fdf9f0,#fff5f0);
  background-size:400% 400%;
  animation:gradient 15s ease infinite;
  position:relative;
  overflow:hidden;
  padding:20px;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background-image:radial-gradient(circle,#ffffff55 1px,transparent 1px);
  background-size:40px 40px;
  opacity:.4;
}

.report-card{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  padding:clamp(25px,4vw,50px);
  border-radius:30px;
  border:1px solid rgba(110,51,255,0.2);
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
  max-width:420px;
  width:100%;
  text-align:center;
  transition:transform .3s ease;
  animation:entrada .8s ease;
  z-index:1;
}

.report-card:hover{
  transform:translateY(-5px);
}

@keyframes entrada{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

.logo{
  width:clamp(120px,25vw,180px);
  height:clamp(120px,25vw,180px);
  border-radius:50%;
  display:block;
  margin:0 auto 25px auto;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
  border:6px solid white;
  object-fit:cover;
}

h1{
  color:#222;
  font-size:clamp(22px,3vw,28px);
  margin-bottom:10px;
  font-weight:800;
}

p.subtitle{
  color:#666;
  margin-bottom:30px;
}

.input-group{
  text-align:left;
  margin-bottom:20px;
}

label{
  font-size:12px;
  font-weight:700;
  color:var(--primary);
  text-transform:uppercase;
  margin-left:5px;
}

.input-icon{
  display:flex;
  align-items:center;
  background:#f9f9f9;
  border:2px solid #eee;
  border-radius:15px;
  padding-left:10px;
  transition:.3s;
}

.input-icon input,
.input-icon textarea{
  border:none;
  background:transparent;
  width:100%;
  padding:14px;
  font-size:clamp(14px,2vw,15px);
  resize: none;
}

.input-icon input:focus,
.input-icon textarea:focus{
  outline:none;
}

.input-icon:focus-within{
  border-color:var(--secondary);
  background:white;
  box-shadow:0 0 15px rgba(255,103,51,0.1);
}

.btn-enviar{
  background:linear-gradient(135deg,var(--secondary),#FF8E66);
  color:white;
  border:none;
  padding:16px;
  width:100%;
  border-radius:15px;
  cursor:pointer;
  margin-top:10px;
  font-weight:bold;
  box-shadow:0 8px 20px rgba(255,103,51,0.3);
  transition:.3s;
  font-size:clamp(14px,2vw,16px);
}

.btn-enviar:hover{
  transform:scale(1.02);
  box-shadow:0 12px 25px rgba(255,103,51,0.4);
}

.btn-volver{
  background:#eee;
  color:#666;
  border:none;
  padding:16px;
  width:100%;
  border-radius:15px;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
  font-size:clamp(14px,2vw,16px);
}

.btn-volver:hover{
  background:#ddd;
}

@media (max-width:480px){
  .report-card{
    padding:20px;
    border-radius:20px;
  }
  .logo{
    width:120px;
    height:120px;
    margin-bottom:15px;
  }
  .btn-enviar, .btn-volver{
    padding:14px;
  }
  .input-icon input,
  .input-icon textarea{
    padding:12px;
  }
}

</style>
</head>

<body>

<div class="report-card">

  <img class="logo" src="logo_cbtis.jpg" alt="Logo CBTIS">

  <h1>Reportar Falla</h1>
  <p class="subtitle">Completa los datos para asistencia técnica</p>

  <div class="input-group">
    <label>Nombre del Alumno</label>
    <div class="input-icon">
      <input type="text" id="nombre" placeholder="Nombre completo">
    </div>
  </div>

  <div class="input-group">
    <label>Número de Serie del Equipo</label>
    <div class="input-icon">
      <input type="text" id="serie" placeholder="S/N">
    </div>
  </div>

  <div class="input-group">
    <label>Descripción del Problema</label>
    <div class="input-icon">
      <textarea id="descripcion" rows="4" placeholder="Describe el problema"></textarea>
    </div>
  </div>

  <button class="btn-enviar" onclick="enviarReporte()">ENVIAR REPORTE</button>
  <button class="btn-volver" onclick="window.location.href='index.html'">VOLVER</button>

</div>

<script>
function enviarReporte(){
  let nombre = document.getElementById("nombre").value.trim();
  let serie = document.getElementById("serie").value.trim();
  let descripcion = document.getElementById("descripcion").value.trim();

  if(!nombre || !serie || !descripcion){
    alert("Por favor llena todos los campos");
    return;
  }

  let fecha = new Date().toISOString().split("T")[0];
  let hora = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

  let reporte = { nombre, serie, descripcion, fecha, hora };

  let reportes = JSON.parse(localStorage.getItem("reportes")) || [];
  reportes.push(reporte);

  localStorage.setItem("reportes", JSON.stringify(reportes));

  alert("Tu reporte ha sido enviado.");
  document.getElementById("nombre").value="";
  document.getElementById("serie").value="";
  document.getElementById("descripcion").value="";
}
</script>

</body>
</html>
