<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportar Falla - CBTIS 258</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-papEjkZw6Bl+PZ1WQZikv+GQ1ZnQZ9dX6k55Nf0b1/PyrR8UkBl/ZFkM1n9J5lw5H0h4s5kTfka1TlY0K3nQWg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
:root{
  --primary:#6E33FF;
  --secondary:#FF6733;
  --bg:#FDF9F0;
}

body{
  font-family:'Poppins',sans-serif;
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(-45deg,#fdf9f0,#e6e0ff,#fdf9f0,#fff5f0);
  background-size:400% 400%;
  animation:gradient 15s ease infinite;
  position:relative;
  overflow:hidden;
  padding:20px;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* partículas fondo */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background-image:radial-gradient(circle,#ffffff55 1px,transparent 1px);
  background-size:40px 40px;
  opacity:.4;
}

/* tarjeta */
.card{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  padding:clamp(25px,4vw,50px);
  border-radius:30px;
  border:1px solid rgba(110,51,255,0.2);
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
  max-width:500px;
  width:100%;
  text-align:center;
  transition:transform .3s ease;
  animation:entrada .8s ease;
  z-index:1;
}

.card:hover{
  transform:translateY(-5px);
}

@keyframes entrada{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* logo */
.logo{
  width:clamp(120px,25vw,180px);
  height:clamp(120px,25vw,180px);
  border-radius:50%;
  display:block;
  margin:0 auto 25px auto;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
  border:6px solid white;
  object-fit:cover;
}

/* titulos */
h1{
  color:#222;
  font-size:clamp(22px,3vw,28px);
  margin-bottom:10px;
  font-weight:800;
}

/* subtitulo */
p.subtitle{
  color:#666;
  margin-bottom:30px;
}

/* input group */
.input-group{
  text-align:left;
  margin-bottom:20px;
}

label{
  font-size:12px;
  font-weight:700;
  color:#6E33FF;
  text-transform:uppercase;
  margin-left:5px;
}

/* input con icono */
.input-icon{
  display:flex;
  align-items:center;
  background:#f9f9f9;
  border:2px solid #eee;
  border-radius:15px;
  padding-left:10px;
  transition:.3s;
}

.input-icon i{
  font-size:18px;
  margin-right:8px;
  color:var(--primary);
}

.input-icon input,
.input-icon textarea{
  border:none;
  background:transparent;
  width:100%;
  padding:14px;
  font-size:clamp(14px,2vw,15px);
  resize:none;
}

.input-icon input:focus,
.input-icon textarea:focus{
  outline:none;
}

.input-icon:focus-within{
  border-color:#6E33FF;
  background:white;
  box-shadow:0 0 15px rgba(110,51,255,0.1);
}

/* botones */
.btn{
  border:none;
  padding:16px;
  width:100%;
  border-radius:15px;
  cursor:pointer;
  font-weight:bold;
  font-size:clamp(14px,2vw,16px);
  transition:.3s;
  margin-bottom:20px;
}

.btn-report{
  background:linear-gradient(135deg,#FF6733,#FF8E66);
  color:white;
  box-shadow:0 8px 20px rgba(255,103,51,0.3);
}

.btn-report:hover{
  transform:scale(1.02);
  box-shadow:0 12px 25px rgba(255,103,51,0.4);
}

.btn-submit{
  background:#6E33FF;
  color:white;
  box-shadow:0 10px 25px rgba(110,51,255,0.3);
  position:relative;
  overflow:hidden;
}

.btn-submit:hover{
  background:#5522CC;
  letter-spacing:1px;
}

.btn-submit::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.6),transparent);
  transition:.6s;
}

.btn-submit:hover::after{
  left:100%;
}

/* footer */
.footer{
  margin-top:20px;
  font-size:12px;
  color:#999;
  text-align:center;
}

/* responsive */
@media (max-width:480px){
  .card{
    padding:25px;
    border-radius:20px;
  }

  .btn{
    padding:14px;
  }
}
</style>
</head>
<body>

<div class="card">
  <img class="logo" src="logo_cbtis.jpg" alt="Logo CBTIS">

  <h1>Reportar Falla</h1>
  <p class="subtitle">Sistema de Control de Laboratorios CBTIS 258</p>

  <button class="btn btn-report" onclick="window.location.href='menu.html'">
    Volver al Menú
  </button>

  <div class="input-group">
    <label>Nombre del Alumno</label>
    <div class="input-icon">
      <i class="fa-solid fa-user"></i>
      <input type="text" placeholder="Nombre completo">
    </div>
  </div>

  <div class="input-group">
    <label>Número de Serie del Equipo</label>
    <div class="input-icon">
      <i class="fa-solid fa-barcode"></i>
      <input type="text" placeholder="S/N del equipo">
    </div>
  </div>

  <div class="input-group">
    <label>Descripción del Problema</label>
    <div class="input-icon">
      <i class="fa-solid fa-pen-to-square"></i>
      <textarea placeholder="Describe el problema"></textarea>
    </div>
  </div>

  <button class="btn btn-submit" onclick="alert('Falla reportada correctamente!')">
    ENVIAR REPORTE
  </button>

  <p class="footer">Sistema de Control de Laboratorios • CBTIS 258</p>
</div>

</body>
</html>
